services:
  bookstore-api:
    image: bookstore-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-api-container
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=data/bookstore.db
    volumes:
      - ./data:/app/data
    restart: always
